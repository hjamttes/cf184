<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>CrossFit 184 — Gear Built for War</title>
<meta name="description" content="CrossFit 184 apparel. Built for athletes who don't quit."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
/* ══════════════════════════════════════════
   CROSSFIT 184 — FULL STOREFRONT SPA
   Shopify Storefront API + SPA routing
   Military brutalism. Zero mercy.
══════════════════════════════════════════ */
:root{
  --bg:#0a0a0a;--pri:#fff;--acc:#4a7c59;--acc2:#2f5039;
  --surf:#111;--surf2:#161616;--mut:#555;--border:rgba(255,255,255,.07);
  --fd:'Bebas Neue',sans-serif;--fb:'DM Sans',sans-serif;
  --nav:56px;--easing:cubic-bezier(.25,.1,.25,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:var(--acc) var(--bg)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--acc)}
body{background:var(--bg);color:var(--pri);font-family:var(--fb);overflow-x:hidden;-webkit-font-smoothing:antialiased;cursor:none}
@media(prefers-reduced-motion:reduce){body{cursor:auto}*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
a{text-decoration:none;color:inherit}ul{list-style:none}img{display:block;width:100%;height:auto}
button{font-family:var(--fb);border:none;cursor:none;background:transparent;color:inherit}

/* ── CURSOR ── */
#cur{position:fixed;top:0;left:0;pointer-events:none;z-index:9999;width:16px;height:16px;transform:translate(-50%,-50%);transition:width 80ms,height 80ms}
#cur.exp{width:24px;height:24px}
.ch,.cv{position:absolute;background:var(--acc)}
.ch{width:100%;height:1px;top:50%;transform:translateY(-50%)}
.cv{height:100%;width:1px;left:50%;transform:translateX(-50%)}
.cd{position:absolute;width:3px;height:3px;background:var(--acc);border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}

/* ── NAV ── */
.nav{position:fixed;top:0;left:0;right:0;height:var(--nav);z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:transparent;transition:background 200ms}
.nav.scr{background:rgba(10,10,10,.94);backdrop-filter:blur(12px)}
.nav::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:var(--border)}
.logo{font-family:var(--fd);font-size:26px;letter-spacing:.05em;cursor:none}
.logo-acc{color:var(--acc)}
.nav-links{display:flex;gap:28px}
.nav-link{font-size:11px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.5);transition:color 120ms;position:relative;cursor:none}
.nav-link::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:1px;background:var(--acc);transition:width 120ms}
.nav-link:hover,.nav-link.active{color:#fff}
.nav-link:hover::after,.nav-link.active::after{width:100%}
.nav-right{display:flex;align-items:center;gap:16px}
.cart-btn{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.55);cursor:none;transition:color 120ms;padding:6px 0}
.cart-btn:hover{color:#fff}
.cart-count{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;background:var(--acc);font-size:10px;font-weight:700;border-radius:0;color:#fff;line-height:1}

/* ── CTA BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--fd);font-size:15px;letter-spacing:.1em;cursor:none;clip-path:polygon(0 0,calc(100% - 7px) 0,100% 7px,100% 100%,7px 100%,0 calc(100% - 7px));transition:background 0ms,color 0ms,opacity 150ms}
.btn-primary{background:var(--acc);color:#fff;padding:13px 26px}
.btn-primary:hover{background:#fff;color:#000}
.btn-primary:disabled{background:var(--mut);color:rgba(255,255,255,.3);cursor:not-allowed}
.btn-white{background:#fff;color:#000;padding:12px 24px}
.btn-white:hover{background:var(--acc);color:#fff}
.btn-ghost{font-family:var(--fb);font-size:11px;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.4);padding:10px 0;border-bottom:1px solid rgba(255,255,255,.2);transition:color 120ms,border-color 120ms}
.btn-ghost:hover{color:#fff;border-color:var(--acc)}
.btn-sm{font-size:12px;padding:8px 16px;clip-path:polygon(0 0,calc(100% - 5px) 0,100% 5px,100% 100%,5px 100%,0 calc(100% - 5px))}
.btn-full{width:100%;justify-content:center}
.sec-tag{font-size:10px;font-weight:700;letter-spacing:.25em;color:var(--acc);text-transform:uppercase;margin-bottom:4px}

/* ── PAGE CONTAINER ── */
#app{min-height:100vh}
.page{display:none}
.page.active{display:block}

/* ════════════════════════════
   HOME PAGE
════════════════════════════ */

/* HERO */
.hero{position:relative;width:100vw;height:100vh;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding:0 5vw;padding-top:var(--nav)}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-bg-img{width:100%;height:100%;object-fit:cover;object-position:center top}
.hero-bg-fallback{position:absolute;inset:0;background:linear-gradient(135deg,#0a0a0a 0%,#0e1a12 40%,#0a0a0a 100%)}
.hero-grid-overlay{position:absolute;inset:0;background-image:linear-gradient(rgba(74,124,89,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(74,124,89,.05) 1px,transparent 1px);background-size:48px 48px}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(10,10,10,.88) 0%,rgba(10,10,10,.25) 60%,rgba(10,10,10,.55) 100%),linear-gradient(to top,rgba(10,10,10,.92) 0%,transparent 50%)}
.hero-scan{position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.1) 2px,rgba(0,0,0,.1) 4px);pointer-events:none}
.hero-content{position:relative;z-index:2;max-width:820px}
.hero-eyebrow{font-size:10px;font-weight:700;letter-spacing:.3em;color:var(--acc);text-transform:uppercase;margin-bottom:16px}
.hero-headline{font-family:var(--fd);font-size:clamp(68px,11vw,155px);line-height:.9;letter-spacing:.02em;text-transform:uppercase;margin-bottom:20px;min-height:2.5em}
.char{display:inline-block;opacity:0}
.hero-sub{font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:32px;opacity:0}
.hero-ctas{display:flex;align-items:center;gap:24px;opacity:0;flex-wrap:wrap}
.corner{position:absolute;width:24px;height:24px;z-index:2}
.ctl{top:20px;left:20px;border-top:1px solid var(--acc);border-left:1px solid var(--acc)}
.ctr{top:20px;right:20px;border-top:1px solid var(--acc);border-right:1px solid var(--acc)}
.cbl{bottom:20px;left:20px;border-bottom:1px solid var(--acc);border-left:1px solid var(--acc)}
.cbr{bottom:20px;right:20px;border-bottom:1px solid var(--acc);border-right:1px solid var(--acc)}
.scroll-ind{position:absolute;bottom:36px;right:36px;z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px}
.scroll-ind-lbl{font-size:9px;letter-spacing:.3em;color:rgba(255,255,255,.3);text-transform:uppercase;writing-mode:vertical-rl}
.scroll-bar{width:1px;height:56px;background:rgba(255,255,255,.12);overflow:hidden}
.scroll-bar-inner{width:100%;height:40%;background:var(--acc);animation:sbar 2s infinite}
@keyframes sbar{0%{transform:translateY(-200%)}100%{transform:translateY(400%)}}

/* TICKER */
.ticker{width:100%;overflow:hidden;background:var(--acc);height:36px;display:flex;align-items:center}
.ticker-track{display:flex;gap:24px;white-space:nowrap;animation:tick 28s linear infinite;font-family:var(--fd);font-size:14px;letter-spacing:.15em;color:rgba(255,255,255,.85)}
.tick-dot{color:rgba(255,255,255,.4);font-size:8px}
@keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* PRODUCT GRID (home) */
.section-hdr{padding:64px 5vw 28px}
.section-title{font-family:var(--fd);font-size:clamp(40px,6vw,76px);letter-spacing:.05em;line-height:1}
.catalog-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:0}

/* PRODUCT CARD */
.product-card{position:relative;background:var(--surf);overflow:hidden;cursor:none;opacity:0;transition:opacity 0ms}
.product-card.vis{opacity:1}
.product-card-inner{display:flex;flex-direction:column;height:100%}
.product-img-wrap{position:relative;aspect-ratio:4/5;overflow:hidden;background:#111}
.product-img-wrap::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,#111 0,#111 12px,#141414 12px,#141414 24px);z-index:0}
.product-img-placeholder{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:var(--fd);font-size:72px;color:rgba(74,124,89,.12);z-index:1;letter-spacing:.05em;white-space:nowrap}
.product-img{width:100%;height:100%;object-fit:cover;position:relative;z-index:2;transition:transform 400ms var(--easing)}
.product-card:hover .product-img{transform:scale(1.04)}
.hover-line{position:absolute;bottom:0;left:0;width:100%;height:3px;z-index:5;background:var(--acc);transform:scaleX(0);transform-origin:left;transition:transform 120ms linear}
.product-card:hover .hover-line{transform:scaleX(1)}
.badge{position:absolute;top:12px;left:12px;z-index:5;font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;background:var(--acc);color:#fff;padding:3px 8px}
.badge-sold{background:#c0392b}
.product-info{padding:16px 20px 20px;background:var(--surf);border-top:1px solid var(--border);flex:1;display:flex;flex-direction:column;justify-content:space-between}
.product-name{font-family:var(--fd);font-size:20px;letter-spacing:.04em;line-height:1.1;margin-bottom:12px}
.product-meta{display:flex;align-items:center;justify-content:space-between}
.product-price{font-family:var(--fd);font-size:22px;letter-spacing:.04em}
.product-price-compare{font-family:var(--fd);font-size:14px;color:var(--mut);text-decoration:line-through;margin-right:6px}

/* CATALOG PAGE */
.catalog-page{padding-top:var(--nav)}
.catalog-filters{display:flex;align-items:center;gap:16px;padding:20px 5vw;border-bottom:1px solid var(--border);flex-wrap:wrap}
.filter-btn{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;padding:7px 14px;border:1px solid var(--border);color:rgba(255,255,255,.45);cursor:none;transition:all 120ms;background:transparent}
.filter-btn:hover,.filter-btn.active{border-color:var(--acc);color:var(--acc)}
.filter-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--mut)}
.catalog-count{margin-left:auto;font-size:11px;letter-spacing:.1em;color:var(--mut)}

/* ════════════════════════════
   PRODUCT DETAIL PAGE
════════════════════════════ */
.product-page{padding-top:var(--nav)}
.product-breadcrumb{padding:16px 5vw;display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);border-bottom:1px solid var(--border)}
.breadcrumb-link{color:var(--mut);cursor:none;transition:color 120ms}
.breadcrumb-link:hover{color:var(--pri)}
.breadcrumb-sep{color:var(--acc)}
.product-detail-grid{display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - var(--nav) - 50px)}

/* Gallery */
.pdp-gallery{position:sticky;top:var(--nav);height:calc(100vh - var(--nav));overflow:hidden;background:#0d0d0d}
.pdp-gallery-main{width:100%;height:100%;object-fit:cover;transition:opacity 200ms}
.pdp-gallery-main.loading{opacity:0}
.pdp-gallery-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:repeating-linear-gradient(45deg,#0e0e0e 0,#0e0e0e 16px,#111 16px,#111 32px)}
.pdp-gallery-fallback-text{font-family:var(--fd);font-size:80px;color:rgba(74,124,89,.1);letter-spacing:.05em}
.pdp-thumbs{position:absolute;bottom:20px;left:0;right:0;display:flex;justify-content:center;gap:8px;z-index:3;padding:0 20px;overflow-x:auto}
.pdp-thumb{width:56px;height:56px;object-fit:cover;opacity:.45;cursor:none;transition:opacity 120ms;border:1px solid transparent;flex-shrink:0;background:#111}
.pdp-thumb.active,.pdp-thumb:hover{opacity:1;border-color:var(--acc)}
.pdp-badge{position:absolute;top:20px;left:20px;z-index:3;font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;background:var(--acc);color:#fff;padding:4px 10px}
.pdp-badge-sale{background:#c0392b}

/* Product Info Panel */
.pdp-info{padding:48px 40px;overflow-y:auto;max-height:calc(100vh - var(--nav));display:flex;flex-direction:column;gap:0}
.pdp-eyebrow{font-size:10px;font-weight:700;letter-spacing:.25em;color:var(--acc);text-transform:uppercase;margin-bottom:8px}
.pdp-title{font-family:var(--fd);font-size:clamp(36px,4vw,60px);letter-spacing:.03em;line-height:.95;text-transform:uppercase;margin-bottom:20px}
.pdp-price-row{display:flex;align-items:baseline;gap:12px;margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.pdp-price{font-family:var(--fd);font-size:36px;letter-spacing:.04em}
.pdp-price-was{font-family:var(--fd);font-size:20px;color:var(--mut);text-decoration:line-through}
.pdp-desc{font-size:14px;line-height:1.75;color:rgba(255,255,255,.6);margin-bottom:28px;padding-bottom:28px;border-bottom:1px solid var(--border)}
.pdp-desc p+p{margin-top:12px}

/* Variants */
.pdp-variants{margin-bottom:24px}
.variant-label{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.variant-selected{color:var(--pri)}
.variant-options{display:flex;flex-wrap:wrap;gap:8px}
.variant-opt{font-family:var(--fb);font-size:12px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:8px 16px;border:1px solid var(--border);color:rgba(255,255,255,.45);cursor:none;background:transparent;transition:all 120ms;position:relative}
.variant-opt:hover:not(.unavail){border-color:rgba(255,255,255,.3);color:var(--pri)}
.variant-opt.selected{border-color:var(--acc);color:var(--acc)}
.variant-opt.unavail{opacity:.3;cursor:not-allowed;position:relative}
.variant-opt.unavail::after{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--mut);transform:rotate(-8deg)}

/* Color swatches */
.color-swatch{width:32px;height:32px;padding:0;position:relative}
.color-swatch.selected::after{content:'';position:absolute;inset:-3px;border:1px solid var(--acc)}

/* Quantity */
.pdp-qty{display:flex;align-items:center;gap:0;margin-bottom:24px}
.qty-label{font-size:10px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.5);margin-right:16px}
.qty-btn{width:40px;height:40px;border:1px solid var(--border);font-size:18px;color:rgba(255,255,255,.5);cursor:none;background:transparent;display:flex;align-items:center;justify-content:center;transition:all 120ms}
.qty-btn:hover{border-color:var(--acc);color:var(--acc)}
.qty-num{width:48px;height:40px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:20px}

/* Add to Cart */
.pdp-actions{display:flex;flex-direction:column;gap:12px;margin-bottom:28px}
.btn-atc{width:100%;justify-content:center;font-size:18px;padding:17px 26px;position:relative;overflow:hidden}
.btn-atc .atc-loading{display:none}
.btn-atc.loading .atc-label{display:none}
.btn-atc.loading .atc-loading{display:inline}
.btn-atc.loading{pointer-events:none;opacity:.7}
.btn-checkout-now{width:100%;justify-content:center;font-size:15px;padding:13px 26px;background:var(--surf2);color:rgba(255,255,255,.6);border:1px solid var(--border)}
.btn-checkout-now:hover{background:#fff;color:#000;border-color:#fff}

/* Product details accordion */
.pdp-accordion{margin-top:4px}
.accordion-item{border-top:1px solid var(--border)}
.accordion-item:last-child{border-bottom:1px solid var(--border)}
.accordion-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 0;cursor:none;font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.5);transition:color 120ms}
.accordion-hdr:hover{color:var(--pri)}
.accordion-hdr .acc-icon{font-size:20px;line-height:1;color:var(--acc);transition:transform 200ms}
.accordion-item.open .acc-icon{transform:rotate(45deg)}
.accordion-body{display:none;padding-bottom:16px;font-size:13px;line-height:1.75;color:rgba(255,255,255,.5)}
.accordion-item.open .accordion-body{display:block}

/* ════════════════════════════
   CART DRAWER
════════════════════════════ */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;opacity:0;pointer-events:none;transition:opacity 200ms}
.cart-overlay.open{opacity:1;pointer-events:all}
.cart-drawer{position:fixed;top:0;right:0;bottom:0;width:420px;max-width:95vw;background:var(--surf);z-index:301;transform:translateX(100%);transition:transform 280ms var(--easing);display:flex;flex-direction:column;border-left:1px solid rgba(74,124,89,.2)}
.cart-drawer.open{transform:translateX(0)}
.cart-hdr{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
.cart-title{font-family:var(--fd);font-size:24px;letter-spacing:.08em}
.cart-close{width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:24px;color:rgba(255,255,255,.4);cursor:none;transition:color 120ms}
.cart-close:hover{color:#fff}
.cart-items{flex:1;overflow-y:auto;padding:0}
.cart-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;padding:40px;text-align:center}
.cart-empty-icon{font-family:var(--fd);font-size:64px;color:rgba(74,124,89,.2);letter-spacing:.05em}
.cart-empty-txt{font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut)}
.cart-item{display:flex;gap:16px;padding:20px 24px;border-bottom:1px solid var(--border);align-items:flex-start}
.cart-item-img{width:80px;height:96px;object-fit:cover;background:#111;flex-shrink:0}
.cart-item-img-placeholder{width:80px;height:96px;background:repeating-linear-gradient(45deg,#111 0,#111 8px,#131313 8px,#131313 16px);flex-shrink:0}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-family:var(--fd);font-size:16px;letter-spacing:.04em;line-height:1.1;margin-bottom:4px}
.cart-item-variant{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);margin-bottom:8px}
.cart-item-price{font-family:var(--fd);font-size:18px;letter-spacing:.04em}
.cart-item-qty{display:flex;align-items:center;gap:0;margin-top:8px}
.cart-qty-btn{width:28px;height:28px;border:1px solid var(--border);font-size:14px;color:rgba(255,255,255,.4);cursor:none;background:transparent;display:flex;align-items:center;justify-content:center;transition:all 120ms}
.cart-qty-btn:hover{border-color:var(--acc);color:var(--acc)}
.cart-qty-num{width:32px;height:28px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:16px}
.cart-item-remove{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mut);cursor:none;transition:color 120ms;margin-top:6px;display:block}
.cart-item-remove:hover{color:#c0392b}
.cart-footer{padding:20px 24px;border-top:1px solid var(--border);background:var(--surf)}
.cart-subtotal{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.cart-subtotal-label{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.4)}
.cart-subtotal-value{font-family:var(--fd);font-size:28px;letter-spacing:.04em}
.cart-subtotal-note{font-size:11px;color:var(--mut);margin-bottom:16px}
.cart-checkout-btn{width:100%;font-size:18px;padding:17px 26px;justify-content:center}

/* ════════════════════════════
   WHO / MISSION SECTIONS
════════════════════════════ */
.who-section{background:var(--surf);padding:88px 5vw}
.who-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start;max-width:1400px;margin:0 auto}
.who-head{font-family:var(--fd);font-size:clamp(44px,6vw,90px);line-height:.95;letter-spacing:.02em}
.who-word{display:block;opacity:0}
.who-acc{color:var(--acc)}
.who-list{display:flex;flex-direction:column}
.who-item{display:flex;align-items:flex-start;gap:12px;padding:18px 0;border-bottom:1px solid rgba(255,255,255,.07);font-size:15px;line-height:1.55;color:rgba(255,255,255,.6);opacity:0}
.who-item:first-child{border-top:1px solid rgba(255,255,255,.07)}
.who-ck{font-family:var(--fd);font-size:20px;color:var(--acc);flex-shrink:0;margin-top:-2px}

<div id="cur" aria-hidden="true"><div class="ch"></div><div class="cv"></div><div class="cd"></div></div>

<!-- ── NAV ── -->

</div>

<script>
/* ═══════════════════════════════════════════════════
   CF184 STOREFRONT — FULL SPA
   Shopify Storefront API + hash router + cart
═══════════════════════════════════════════════════ */

/* ── CONFIG ── */
const SHOP = {
  domain: 'cf184.myshopify.com',
  token: '63e59d177860324e0ed17e6ee58f6cb5', // DEV — headless storefront API key
  api: '2026-04'
};

/* ── STATE ── */
const state = {
  products: [],       // all products from Shopify
  productsMap: {},    // handle → product
  cart: [],           // [{variantId, title, variantTitle, price, image, quantity, handle}]
  loading: false,
  cartOpen: false,
  currentRoute: '/',
};

/* ══════════════════════════════════
   SHOPIFY API
══════════════════════════════════ */

async function shopifyQuery(query, variables = {}) {
  const res = await fetch(
    `https://${SHOP.domain}/api/${SHOP.api}/graphql.json`,
    {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Shopify-Storefront-Access-Token': SHOP.token,
      },
      body: JSON.stringify({ query, variables }),
    }
  );
  if (!res.ok) throw new Error(`Shopify ${res.status}`);
  const json = await res.json();
  if (json.errors) throw new Error(json.errors[0].message);
  return json.data;
}

const PRODUCTS_QUERY = `
  query GetProducts($first: Int!, $after: String) {
    products(first: $first, after: $after) {
      pageInfo { hasNextPage endCursor }
      edges {
        node {
          id handle title
          descriptionHtml
          tags
          priceRange {
            minVariantPrice { amount currencyCode }
            maxVariantPrice { amount currencyCode }
          }
          compareAtPriceRange {
            minVariantPrice { amount currencyCode }
          }
          images(first: 6) {
            edges { node { url altText width height } }
          }
          variants(first: 50) {
            edges {
              node {
                id title availableForSale quantityAvailable
                price { amount currencyCode }
                compareAtPrice { amount currencyCode }
                selectedOptions { name value }
                image { url altText }
              }
            }
          }
          options { id name values }
        }
      }
    }
  }
`;

async function fetchAllProducts() {
  const allProducts = [];
  let cursor = null;
  let hasNext = true;

  while (hasNext) {
    const data = await shopifyQuery(PRODUCTS_QUERY, { first: 50, after: cursor });
    const edges = data.products.edges;
    edges.forEach(e => {
      const p = e.node;
      p.imageList = p.images.edges.map(i => i.node);
      p.variantList = p.variants.edges.map(v => v.node);
      allProducts.push(p);
      state.productsMap[p.handle] = p;
    });
    hasNext = data.products.pageInfo.hasNextPage;
    cursor = data.products.pageInfo.endCursor;
  }

  return allProducts;
}

/* Cart mutation */
const CREATE_CART = `
  mutation cartCreate($input: CartInput!) {
    cartCreate(input: $input) {
      cart { id checkoutUrl }
      userErrors { message field }
    }
  }
`;

async function createCheckout() {
  const lines = state.cart.map(item => ({
    merchandiseId: item.variantId,
    quantity: item.quantity,
  }));

  const data = await shopifyQuery(CREATE_CART, {
    input: { lines }
  });

  const errs = data.cartCreate.userErrors;
  if (errs && errs.length) throw new Error(errs[0].message);
  return data.cartCreate.cart.checkoutUrl;
}

/* ══════════════════════════════════
   CART LOGIC
══════════════════════════════════ */

function cartAdd(item) {
  const existing = state.cart.find(c => c.variantId === item.variantId);
  if (existing) {
    existing.quantity += item.quantity || 1;
  } else {
    state.cart.push({ ...item, quantity: item.quantity || 1 });
  }
  saveCart();
  renderCart();
  updateCartCount();
  showToast(`${item.title} — added to kit`);
  openCart();
}

function cartUpdateQty(variantId, delta) {
  const item = state.cart.find(c => c.variantId === variantId);
  if (!item) return;
  item.quantity += delta;
  if (item.quantity <= 0) {
    state.cart = state.cart.filter(c => c.variantId !== variantId);
  }
  saveCart();
  renderCart();
  updateCartCount();
}

function cartRemove(variantId) {
  state.cart = state.cart.filter(c => c.variantId !== variantId);
  saveCart();
  renderCart();
  updateCartCount();
}

function cartTotal() {
  return state.cart.reduce((s, item) => s + parseFloat(item.price) * item.quantity, 0);
}

function saveCart() {
  try { localStorage.setItem('cf184_cart', JSON.stringify(state.cart)); } catch(_){}
}

function loadCart() {
  try {
    const saved = localStorage.getItem('cf184_cart');
    if (saved) state.cart = JSON.parse(saved);
  } catch(_) {}
}

function updateCartCount() {
  const count = state.cart.reduce((s, i) => s + i.quantity, 0);
  document.getElementById('cartCount').textContent = count;
}

/* ══════════════════════════════════
   CART UI
══════════════════════════════════ */

function openCart() {
  state.cartOpen = true;
  document.getElementById('cartDrawer').classList.add('open');
  document.getElementById('cartOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeCart() {
  state.cartOpen = false;
  document.getElementById('cartDrawer').classList.remove('open');
  document.getElementById('cartOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function renderCart() {
  const itemsEl = document.getElementById('cartItems');
  const footerEl = document.getElementById('cartFooter');

  if (!state.cart.length) {
    itemsEl.innerHTML = `
      <div class="cart-empty">
        <div class="cart-empty-icon">CF184</div>
        <p class="cart-empty-txt">Your kit is empty.<br>Get to work.</p>
        <button class="btn btn-primary btn-sm" onclick="closeCart();navigate('/shop')">SHOP NOW</button>
      </div>`;
    footerEl.innerHTML = '';
    return;
  }

  itemsEl.innerHTML = state.cart.map(item => `
    <div class="cart-item" data-variant="${item.variantId}">
      ${item.image
        ? `<img src="${item.image}" alt="${item.title}" class="cart-item-img" loading="lazy"/>`
        : `<div class="cart-item-img-placeholder"></div>`}
      <div class="cart-item-info">
        <div class="cart-item-name">${item.title.toUpperCase()}</div>
        <div class="cart-item-variant">${item.variantTitle !== 'Default Title' ? item.variantTitle : ''}</div>
        <div class="cart-item-price">${formatPrice(item.price, item.currency)}</div>
        <div class="cart-item-qty">
          <button class="cart-qty-btn" onclick="cartUpdateQty('${item.variantId}',-1)" aria-label="Decrease quantity">−</button>
          <div class="cart-qty-num">${item.quantity}</div>
          <button class="cart-qty-btn" onclick="cartUpdateQty('${item.variantId}',1)" aria-label="Increase quantity">+</button>
        </div>
        <button class="cart-item-remove" onclick="cartRemove('${item.variantId}')">Remove</button>
      </div>
    </div>
  `).join('');

  const total = cartTotal();
  const currency = state.cart[0]?.currency || 'USD';
  footerEl.innerHTML = `
    <div class="cart-subtotal">
      <span class="cart-subtotal-label">Subtotal</span>
      <span class="cart-subtotal-value">${formatPrice(total, currency)}</span>
    </div>
    <p class="cart-subtotal-note">Taxes + shipping calculated at checkout</p>
    <button class="btn btn-primary cart-checkout-btn" onclick="handleCheckout()">
      CHECKOUT →
    </button>`;
}

async function handleCheckout() {
  if (!state.cart.length) return;

  // If using real Shopify token, create checkout via API
  if (SHOP.token !== 'YOUR_STOREFRONT_ACCESS_TOKEN') {
    const btn = document.querySelector('.cart-checkout-btn');
    if (btn) { btn.textContent = 'LOADING...'; btn.disabled = true; }
    try {
      const url = await createCheckout();
      window.location.href = url;
    } catch(e) {
      showToast('Checkout error — try again');
      if (btn) { btn.textContent = 'CHECKOUT →'; btn.disabled = false; }
    }
  } else {
    // Demo mode: redirect to shop domain
    showToast('Set your Shopify token to enable checkout');
  }
}

/* ══════════════════════════════════
   HASH ROUTER
══════════════════════════════════ */

function navigate(path) {
  window.location.hash = '#' + path;
}

function getRoute() {
  const hash = window.location.hash;
  if (!hash || hash === '#' || hash === '#/') return { path: '/', params: {} };
  const path = hash.slice(1); // remove #
  const parts = path.split('/').filter(Boolean);
  if (parts[0] === 'product' && parts[1]) {
    return { path: '/product', params: { handle: parts[1] } };
  }
  if (parts[0] === 'shop') return { path: '/shop', params: {} };
  if (parts[0] === 'about') return { path: '/about', params: {} };
  return { path: '/', params: {} };
}

window.addEventListener('hashchange', () => {
  const route = getRoute();
  renderRoute(route);
  window.scrollTo(0, 0);
});

async function renderRoute(route) {
  state.currentRoute = route.path;
  updateNavLinks(route.path);
  const app = document.getElementById('app');

  if (route.path === '/') {
    renderHome(app);
  } else if (route.path === '/shop') {
    renderShop(app);
  } else if (route.path === '/product') {
    renderProduct(app, route.params.handle);
  } else {
    renderHome(app);
  }
}

function updateNavLinks(path) {
  document.querySelectorAll('.nav-link').forEach(l => {
    const href = l.getAttribute('data-link');
    l.classList.toggle('active', href === path || (href === '/shop' && path === '/product'));
  });
}

/* ══════════════════════════════════
   HELPERS
══════════════════════════════════ */

function formatPrice(amount, currency = 'USD') {
  return new Intl.NumberFormat('en-US', {
    style: 'currency', currency, minimumFractionDigits: 0, maximumFractionDigits: 2
  }).format(parseFloat(amount));
}

function getBadge(p) {
  const tags = (p.tags || []).map(t => t.toLowerCase());
  if (!p.variantList?.some(v => v.availableForSale)) return { label: 'SOLD OUT', cls: 'badge-sold' };
  if (tags.includes('new')) return { label: 'NEW', cls: '' };
  if (tags.includes('bestseller') || tags.includes('best seller')) return { label: 'BESTSELLER', cls: '' };
  if (tags.includes('limited')) return { label: 'LIMITED', cls: '' };
  if (tags.includes('sale')) return { label: 'SALE', cls: 'badge-sale' };
  return null;
}

function getProductImage(p, index = 0) {
  return p.imageList?.[index]?.url || null;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function observeSnap(selector) {
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('vis'); io.unobserve(e.target); }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll(selector).forEach(el => io.observe(el));
}

function observeWords(selector) {
  const io = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      const words = e.target.querySelectorAll('[data-word]');
      words.forEach((w, i) => setTimeout(() => { w.style.opacity = '1'; }, i * 80));
      io.unobserve(e.target);
    });
  }, { threshold: 0.2 });
  document.querySelectorAll(selector).forEach(el => io.observe(el));
}

/* ══════════════════════════════════
   HOME PAGE
══════════════════════════════════ */

function renderHome(app) {
  const featuredProducts = state.products.slice(0, 4);

  app.innerHTML = `
    <!-- HERO -->
    <section class="hero" aria-label="Hero">
      <div class="hero-bg">
        <div class="hero-bg-fallback"></div>
        <div class="hero-grid-overlay"></div>
        <div class="hero-overlay"></div>
        <div class="hero-scan"></div>
      </div>
      <div class="corner ctl"></div><div class="corner ctr"></div>
      <div class="corner cbl"></div><div class="corner cbr"></div>
      <div class="hero-content">
        <div class="hero-eyebrow">// CROSSFIT 184 //</div>
        <h1 class="hero-headline" id="hh" aria-label="Gear Built for War"></h1>
        <p class="hero-sub" id="hs">No compromises. No spectators.</p>
        <div class="hero-ctas" id="hc">
          <a href="#/shop" class="btn btn-primary" data-link="/shop">SHOP THE DROP →</a>
          <a href="#/about" class="btn btn-ghost" data-link="/about">WHO THIS IS FOR</a>
        </div>
      </div>
      <div class="scroll-ind" aria-hidden="true">
        <span class="scroll-ind-lbl">SCROLL</span>
        <div class="scroll-bar"><div class="scroll-bar-inner"></div></div>
      </div>
    </section>

    <!-- TICKER -->
    <div class="ticker" aria-hidden="true">
      <div class="ticker-track">
        ${Array(3).fill(`
          <span>CROSSFIT 184</span><span class="tick-dot">✦</span>
          <span>BUILT FOR WAR</span><span class="tick-dot">✦</span>
          <span>NO SPECTATORS</span><span class="tick-dot">✦</span>
          <span>EARN YOUR GEAR</span><span class="tick-dot">✦</span>
          <span>CF184 APPAREL</span><span class="tick-dot">✦</span>
          <span>MILITARY GRADE</span><span class="tick-dot">✦</span>
        `).join('')}
      </div>
    </div>

    <!-- FEATURED PRODUCTS -->
    <section aria-label="Featured products">
      <div class="section-hdr">
        <div class="sec-tag">// THE DROP //</div>
        <h2 class="section-title">CURRENT ISSUE</h2>
      </div>
      <div class="catalog-grid" id="featuredGrid">
        ${state.products.length
          ? featuredProducts.map(p => productCardHTML(p)).join('')
          : Array(4).fill(`<div class="product-card vis skeleton-card skeleton"></div>`).join('')
        }
      </div>
      <div style="padding:40px 5vw;display:flex;justify-content:center;border-top:1px solid var(--border)">
        <a href="#/shop" class="btn btn-primary" data-link="/shop">VIEW FULL CATALOG →</a>
      </div>
    </section>

    <!-- WHO THIS IS FOR -->
    <section class="who-section" aria-label="Who this is for">
      <div class="who-grid" id="whoSection">
        <div>
          <div class="sec-tag">// IDENTITY //</div>
          <h2 class="who-head">
            ${['THIS','IS','NOT','FOR',`<span class="who-acc">EVERYONE.</span>`]
              .map(w => `<span class="who-word" data-word style="display:block;opacity:0">${w}</span>`).join('')}
          </h2>
        </div>
        <ul class="who-list">
          ${[
            'You show up when it\'s 5am and dark outside.',
            'You don\'t track macros — you track PRs.',
            'Your gear gets destroyed in the process of building something unbreakable.',
            'You wear your affiliate like a unit patch.',
            'Community isn\'t a feature. It\'s the whole point.',
          ].map((txt, i) => `
            <li class="who-item" data-who="${i}" style="opacity:0">
              <span class="who-ck">+</span><span>${txt}</span>
            </li>`).join('')}
        </ul>
      </div>
    </section>

    <!-- MISSION -->
    <section class="mission" aria-label="Mission">
      <div class="mission-num" aria-hidden="true">184</div>
      <blockquote class="mission-q">
        <p class="mission-t">We don't make lifestyle apparel.<br>We make gear for the <em>work</em>.</p>
        <footer class="mission-f"><cite>— CrossFit 184, Est. Day One</cite></footer>
      </blockquote>

  `;

  stencilHeadline(['GEAR','BUILT','FOR WAR']);
  observeSnap('.product-card');
  observeWords('#whoSection');

  // Who items stagger
  const whoIO = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (!e.isIntersecting) return;
      e.target.querySelectorAll('[data-who]').forEach((el, i) => {
        setTimeout(() => { el.style.opacity = '1'; }, i * 80);
      });
      whoIO.unobserve(e.target);
    });
  }, { threshold: 0.15 });
  const whoSection = document.querySelector('.who-list');
  if (whoSection) whoIO.observe(whoSection);
}

/* ══════════════════════════════════
   SHOP PAGE
══════════════════════════════════ */

function renderShop(app) {
  const tags = [...new Set(state.products.flatMap(p => p.tags || []))].filter(Boolean).slice(0, 8);

  app.innerHTML = `
    <div class="catalog-page">
      <div class="section-hdr" style="padding-bottom:0">
        <div class="sec-tag">// FULL COLLECTION //</div>
        <h2 class="section-title">ALL GEAR</h2>
      </div>
      <div class="catalog-filters" id="filters">
        <span class="filter-label">FILTER:</span>
        <button class="filter-btn active" data-tag="all">ALL</button>
        ${tags.map(t => `<button class="filter-btn" data-tag="${t}">${t.toUpperCase()}</button>`).join('')}
        <span class="catalog-count" id="catalogCount">${state.products.length} items</span>
      </div>
      <div class="catalog-grid" id="shopGrid">
        ${state.products.map(p => productCardHTML(p)).join('')}
      </div>
    </div>
    ${footerHTML()}
  `;

  observeSnap('.product-card');

  // Filter logic
  let activeTag = 'all';
  document.getElementById('filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    activeTag = btn.dataset.tag;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.tag === activeTag));
    const filtered = activeTag === 'all'
      ? state.products
      : state.products.filter(p => (p.tags || []).map(t => t.toLowerCase()).includes(activeTag.toLowerCase()));
    document.getElementById('shopGrid').innerHTML = filtered.map(p => productCardHTML(p)).join('');
    document.getElementById('catalogCount').textContent = `${filtered.length} items`;
    observeSnap('.product-card');
  });
}

/* ══════════════════════════════════
   PRODUCT CARD HTML
══════════════════════════════════ */

function productCardHTML(p) {
  const img = getProductImage(p);
  const price = p.priceRange.minVariantPrice;
  const maxPrice = p.priceRange.maxVariantPrice;
  const compareAt = p.compareAtPriceRange?.minVariantPrice?.amount;
  const hasRange = parseFloat(maxPrice.amount) > parseFloat(price.amount);
  const badge = getBadge(p);

  return `
    <article class="product-card" data-handle="${p.handle}" onclick="navigate('/product/${p.handle}')">
      <div class="product-card-inner">
        <div class="product-img-wrap">
          <div class="product-img-placeholder">${p.title.slice(0,3).toUpperCase()}</div>
          ${img ? `<img src="${img}" alt="${p.imageList[0]?.altText || p.title}" class="product-img" loading="lazy" decoding="async"/>` : ''}
          <div class="hover-line"></div>
          ${badge ? `<span class="badge ${badge.cls}">${badge.label}</span>` : ''}
        </div>
        <div class="product-info">
          <h3 class="product-name">${p.title.toUpperCase()}</h3>
          <div class="product-meta">
            <div style="display:flex;align-items:baseline;gap:6px">
              ${compareAt && parseFloat(compareAt) > parseFloat(price.amount)
                ? `<span class="product-price-compare">${formatPrice(compareAt, price.currencyCode)}</span>` : ''}
              <span class="product-price">${hasRange ? 'FROM ' : ''}${formatPrice(price.amount, price.currencyCode)}</span>
            </div>
            <button class="btn btn-white btn-sm" onclick="event.stopPropagation();navigate('/product/${p.handle}')">VIEW</button>
          </div>
        </div>
      </div>
    </article>`;
}

/* ══════════════════════════════════
   PRODUCT DETAIL PAGE
══════════════════════════════════ */

function renderProduct(app, handle) {
  const p = state.productsMap[handle];

  if (!p) {
    app.innerHTML = `
      <div style="padding-top:var(--nav)">
        <div class="error-state">
          <h2>PRODUCT NOT FOUND</h2>
          <p>This item may be sold out or removed.</p>
          <a href="#/shop" class="btn btn-primary">BACK TO SHOP</a>
        </div>
        ${footerHTML()}
      </div>`;
    return;
  }

  const images = p.imageList || [];
  const variants = p.variantList || [];
  const options = p.options || [];
  const hasSingleDefaultVariant = variants.length === 1 && variants[0].title === 'Default Title';
  const firstVariant = variants[0];
  const compareAt = firstVariant?.compareAtPrice?.amount;
  const isOnSale = compareAt && parseFloat(compareAt) > parseFloat(firstVariant?.price?.amount || '0');

  app.innerHTML = `
    <div class="product-page">
      <div class="product-breadcrumb">
        <a href="#/" class="breadcrumb-link" data-link="/">HOME</a>
        <span class="breadcrumb-sep">/</span>
        <a href="#/shop" class="breadcrumb-link" data-link="/shop">SHOP</a>
        <span class="breadcrumb-sep">/</span>
        <span>${p.title.toUpperCase()}</span>
      </div>

      <div class="product-detail-grid">
        <!-- GALLERY -->
        <div class="pdp-gallery" id="gallery">
          ${images.length
            ? `<img src="${images[0].url}" alt="${images[0].altText || p.title}" class="pdp-gallery-main" id="galleryMain"/>
               ${isOnSale ? `<div class="pdp-badge pdp-badge-sale">SALE</div>` : ''}
               ${images.length > 1 ? `
               <div class="pdp-thumbs" id="thumbs">
                 ${images.map((img, i) => `
                   <img src="${img.url}" alt="${img.altText || p.title}"
                     class="pdp-thumb ${i === 0 ? 'active' : ''}"
                     onclick="switchImage('${img.url}', this)"
                     loading="lazy"/>
                 `).join('')}
               </div>` : ''}`
            : `<div class="pdp-gallery-fallback"><div class="pdp-gallery-fallback-text">${p.title.slice(0,3).toUpperCase()}</div></div>`
          }
        </div>

        <!-- INFO PANEL -->
        <div class="pdp-info" id="pdpInfo">
          <div class="pdp-eyebrow">CROSSFIT 184</div>
          <h1 class="pdp-title">${p.title.toUpperCase()}</h1>

          <div class="pdp-price-row">
            <span class="pdp-price" id="pdpPrice">${formatPrice(firstVariant?.price?.amount || '0', firstVariant?.price?.currencyCode || 'USD')}</span>
            ${isOnSale ? `<span class="pdp-price-was">${formatPrice(compareAt, firstVariant?.compareAtPrice?.currencyCode || 'USD')}</span>` : ''}
          </div>

          ${!hasSingleDefaultVariant ? options.map(opt => `
            <div class="pdp-variants" id="opt-${opt.id}">
              <div class="variant-label">
                ${opt.name.toUpperCase()}:
                <span class="variant-selected" id="opt-selected-${opt.id}"></span>
              </div>
              <div class="variant-options" id="opt-values-${opt.id}">
                ${opt.values.map(val => {
                  const isColor = opt.name.toLowerCase() === 'color';
                  const avail = variants.some(v =>
                    v.selectedOptions.some(o => o.name === opt.name && o.value === val) && v.availableForSale
                  );
                  return isColor
                    ? `<button class="variant-opt color-swatch ${!avail ? 'unavail' : ''}"
                          data-opt="${opt.name}" data-val="${val}"
                          title="${val}"
                          style="background:${colorToHex(val)}"
                          onclick="selectVariantOption('${opt.name}','${val}')"></button>`
                    : `<button class="variant-opt ${!avail ? 'unavail' : ''}"
                          data-opt="${opt.name}" data-val="${val}"
                          onclick="selectVariantOption('${opt.name}','${val}')">${val}</button>`;
                }).join('')}
              </div>
            </div>
          `).join('') : ''}

          <!-- QTY -->
          <div class="pdp-qty">
            <span class="qty-label">QTY</span>
            <button class="qty-btn" onclick="changeQty(-1)" aria-label="Decrease">−</button>
            <div class="qty-num" id="qtyNum">1</div>
            <button class="qty-btn" onclick="changeQty(1)" aria-label="Increase">+</button>
          </div>

          <!-- ACTIONS -->
          <div class="pdp-actions">
            <button class="btn btn-primary btn-atc" id="atcBtn" onclick="addToCartFromPDP()">
              <span class="atc-label">ADD TO KIT</span>
              <span class="atc-loading">ADDING...</span>
            </button>
            <button class="btn btn-checkout-now btn-full" onclick="buyNow()">
              BUY NOW — DIRECT CHECKOUT
            </button>
          </div>

          <!-- DESCRIPTION -->
          ${p.descriptionHtml ? `
          <div class="pdp-accordion">
            <div class="accordion-item open">
              <div class="accordion-hdr" onclick="toggleAccordion(this)">
                PRODUCT DETAILS <span class="acc-icon">+</span>
              </div>
              <div class="accordion-body pdp-desc">${p.descriptionHtml}</div>
            </div>
            <div class="accordion-item">
              <div class="accordion-hdr" onclick="toggleAccordion(this)">
                SIZE & FIT <span class="acc-icon">+</span>
              </div>
              <div class="accordion-body">
                <p>Our apparel is designed to move with you — not against you. Athletic cut, true to size. When in doubt, size up for layering.</p>
              </div>
            </div>
            <div class="accordion-item">
              <div class="accordion-hdr" onclick="toggleAccordion(this)">
                SHIPPING & RETURNS <span class="acc-icon">+</span>
              </div>
              <div class="accordion-body">
                <p>Free shipping on orders over $75. Orders ship within 2–3 business days. Returns accepted within 30 days — unworn items only.</p>
              </div>
            </div>
          </div>` : ''}
        </div>
      </div>
    </div>
    ${footerHTML()}
  `;

  // Init PDP state
  window._pdpState = {
    product: p,
    selectedOptions: {},
    qty: 1,
    currentVariant: firstVariant,
  };

  // Pre-select first value of each option
  if (!hasSingleDefaultVariant) {
    options.forEach(opt => {
      const firstVal = opt.values[0];
      selectVariantOption(opt.name, firstVal, true);
    });
  }
}

function switchImage(url, thumb) {
  const main = document.getElementById('galleryMain');
  if (!main) return;
  main.classList.add('loading');
  const img = new Image();
  img.onload = () => { main.src = url; main.classList.remove('loading'); };
  img.src = url;
  document.querySelectorAll('.pdp-thumb').forEach(t => t.classList.remove('active'));
  if (thumb) thumb.classList.add('active');
}

function selectVariantOption(optName, val, silent = false) {
  if (!window._pdpState) return;
  const { product } = window._pdpState;
  window._pdpState.selectedOptions[optName] = val;

  // Update UI
  document.querySelectorAll(`[data-opt="${optName}"]`).forEach(btn => {
    btn.classList.toggle('selected', btn.dataset.val === val);
  });

  // Find matching variant
  const variant = product.variantList.find(v =>
    v.selectedOptions.every(o => window._pdpState.selectedOptions[o.name] === o.value)
  );

  if (variant) {
    window._pdpState.currentVariant = variant;
    const priceEl = document.getElementById('pdpPrice');
    if (priceEl) priceEl.textContent = formatPrice(variant.price.amount, variant.price.currencyCode);

    // Update ATC button availability
    const atcBtn = document.getElementById('atcBtn');
    if (atcBtn) {
      atcBtn.disabled = !variant.availableForSale;
      atcBtn.querySelector('.atc-label').textContent = variant.availableForSale ? 'ADD TO KIT' : 'SOLD OUT';
    }

    // Update gallery if variant has unique image
    if (variant.image && !silent) {
      switchImage(variant.image.url, null);
    }
  }

  // Update selected label
  const labelEl = document.getElementById(`opt-selected-${product.options.find(o => o.name === optName)?.id}`);
  if (labelEl) labelEl.textContent = val;
}

function changeQty(delta) {
  if (!window._pdpState) return;
  window._pdpState.qty = Math.max(1, (window._pdpState.qty || 1) + delta);
  const el = document.getElementById('qtyNum');
  if (el) el.textContent = window._pdpState.qty;
}

function addToCartFromPDP() {
  if (!window._pdpState) return;
  const { product, currentVariant, qty } = window._pdpState;
  if (!currentVariant) return;

  const btn = document.getElementById('atcBtn');
  if (btn) btn.classList.add('loading');

  setTimeout(() => {
    cartAdd({
      variantId: currentVariant.id,
      title: product.title,
      variantTitle: currentVariant.title,
      price: currentVariant.price.amount,
      currency: currentVariant.price.currencyCode,
      image: currentVariant.image?.url || product.imageList?.[0]?.url || null,
      handle: product.handle,
      quantity: qty || 1,
    });
    if (btn) btn.classList.remove('loading');
  }, 300);
}

async function buyNow() {
  if (!window._pdpState) return;
  const { currentVariant } = window._pdpState;
  if (!currentVariant) return;

  // Add to cart first, then checkout
  addToCartFromPDP();
  setTimeout(() => handleCheckout(), 400);
}

function toggleAccordion(hdr) {
  const item = hdr.closest('.accordion-item');
  item.classList.toggle('open');
}

function colorToHex(colorName) {
  const map = {
    black:'#0a0a0a', white:'#ffffff', red:'#c0392b', blue:'#2980b9',
    green:'#4a7c59', gray:'#555', grey:'#555', navy:'#1a2a4a',
    olive:'#4a4a1a', tan:'#c8a87a', khaki:'#b5a642',
    orange:'#e67e22', yellow:'#f1c40f', purple:'#8e44ad',
    pink:'#e91e8c', brown:'#7f5539', 'od green':'#4a5c2a',
    'ranger green':'#4a5c35', 'military green':'#4a7c59',
  };
  return map[colorName.toLowerCase()] || '#333';
}

function footerHTML() {
  return `
    <footer>
      <div class="footer-top">
        <div class="footer-logo">CF<span class="logo-acc">184</span></div>
        <nav class="footer-nav" aria-label="Footer">
          <a href="#/shop" data-link="/shop">Shop</a>
          <a href="#/shop" data-link="/shop">Size Guide</a>
          <a href="#/shop" data-link="/shop">Shipping</a>
          <a href="#/about" data-link="/about">About</a>
        </nav>
      </div>
      <div class="footer-bot">
        <span>© 2025 CrossFit 184. All rights reserved.</span>
        <span>Powered by Shopify</span>
      </div>
    </footer>`;
}

/* ══════════════════════════════════
   HERO HEADLINE STENCIL
══════════════════════════════════ */

function stencilHeadline(lines) {
  const el = document.getElementById('hh');
  if (!el) return;
  el.innerHTML = '';
  const chars = [];
  lines.forEach(line => {
    const ld = document.createElement('span');
    ld.style.display = 'block';
    [...line].forEach(c => {
      const s = document.createElement('span');
      s.className = 'char';
      s.textContent = c;
      if (c === ' ') { s.style.display = 'inline-block'; s.style.width = '.3em'; s.style.opacity = '1'; }
      else chars.push(s);
      ld.appendChild(s);
    });
    el.appendChild(ld);
  });

  const reduced = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  if (reduced) {
    chars.forEach(c => c.style.opacity = '1');
    const sub = document.getElementById('hs');
    const cta = document.getElementById('hc');
    if (sub) sub.style.opacity = '1';
    if (cta) cta.style.opacity = '1';
    return;
  }

  chars.forEach((c, i) => setTimeout(() => c.style.opacity = '1', i * 40));
  const total = chars.length * 40;
  setTimeout(() => { const e = document.getElementById('hs'); if(e) e.style.opacity='1'; }, total);
  setTimeout(() => { const e = document.getElementById('hc'); if(e) e.style.opacity='1'; }, Math.max(600, total + 80));
}

/* ══════════════════════════════════
   NAV SCROLL
══════════════════════════════════ */

window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('scr', window.scrollY > 60);
}, { passive: true });

/* ══════════════════════════════════
   CUSTOM CURSOR
══════════════════════════════════ */

const reduced = window.matchMedia('(prefers-reduced-motion:reduce)').matches;
const cur = document.getElementById('cur');

if (!reduced) {
  document.addEventListener('mousemove', e => {
    cur.style.transform = `translate(calc(${e.clientX}px - 50%), calc(${e.clientY}px - 50%))`;
  });
  document.addEventListener('mouseleave', () => cur.style.opacity = '0');
  document.addEventListener('mouseenter', () => cur.style.opacity = '1');

  document.addEventListener('mouseover', e => {
    const target = e.target.closest('a, button, .product-card, .variant-opt, .pdp-thumb, .cart-qty-btn, .qty-btn');
    cur.classList.toggle('exp', !!target);
  });
}

/* ══════════════════════════════════
   CART EVENTS
══════════════════════════════════ */

document.getElementById('cartBtn').addEventListener('click', openCart);
document.getElementById('cartClose').addEventListener('click', closeCart);
document.getElementById('cartOverlay').addEventListener('click', closeCart);

/* ══════════════════════════════════
   INIT
══════════════════════════════════ */

async function init() {
  loadCart();
  updateCartCount();
  renderCart();

  // Show initial route immediately (may show loading skeletons)
  const route = getRoute();
  renderRoute(route);

  // Fetch products from Shopify
  if (SHOP.token !== 'YOUR_STOREFRONT_ACCESS_TOKEN') {
    try {
      state.loading = true;
      state.products = await fetchAllProducts();
      state.loading = false;
      // Re-render current route with real data
      renderRoute(getRoute());
    } catch(err) {
      console.error('CF184: Shopify fetch failed —', err);
      state.loading = false;
      showToast('Could not load products');
    }
  } else {
    // Demo mode — inject placeholder products
    state.products = generateDemoProducts();
    state.products.forEach(p => { state.productsMap[p.handle] = p; });
    renderRoute(getRoute());
    showToast('Demo mode — add your Shopify token');
  }
}

    { title: 'Competition Belt — Black', price: '95.00', tags: ['limited','equipment'], options:[{id:'o4',name:'Size',values:['S/M','L/XL']}] },
    { title: 'Performance Cap — Blackout', price: '32.00', tags: ['apparel','accessories'], options:[{id:'o5',name:'Size',values:['One Size']}] },

    { title: 'Long Sleeve — Ranger Green', price: '54.00', tags: ['apparel'], options:[{id:'o7',name:'Size',values:['S','M','L','XL']}] },
    { title: 'Knee Sleeves — Black', price: '68.00', tags: ['equipment'], options:[{id:'o8',name:'Size',values:['S','M','L','XL']}] },

  return demoData.map((d, i) => {

init();
